<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>SPED Analyzer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="layout">


<aside>


<h2>SPED</h2>


<nav>

<button onclick="aba('dashboard')">Dashboard</button>

<button onclick="aba('empresa')">Empresa</button>

<button onclick="aba('notas')">Notas</button>

<button onclick="aba('produtos')">Produtos</button>

<button onclick="aba('auditoria')">⚠ Auditoria</button>


</nav>


</aside>




<main>


<header>


<h1>SPED Analyzer</h1>


<div>

<input 
type="file"
id="arquivo"
accept=".txt">


<button onclick="consultar()">
🚀 Analisar SPED
</button>

</div>


</header>




<section id="dashboard" class="page">


<div class="cards">


<div class="card">

<h3>Notas</h3>

<strong id="qtdNotas">0</strong>

</div>


<div class="card">

<h3>Produtos</h3>

<strong id="qtdProdutos">0</strong>

</div>


<div class="card">

<h3>Participantes</h3>

<strong id="qtdPart">0</strong>

</div>


<div class="card">

<h3>Valor Total</h3>

<strong id="valorTotal">
R$ 0
</strong>

</div>


</div>



<div class="panel">

<h2>Resumo Fiscal</h2>

<p id="resumo">
Nenhum arquivo carregado
</p>

</div>


</section>





<section id="empresa" class="page hidden">


<div class="panel">

<h2>Empresa</h2>


<div id="dadosEmpresa"></div>


</div>


</section>





<section id="notas" class="page hidden">


<div class="panel">


<h2>Notas Fiscais</h2>


<input 
placeholder="Pesquisar NF"
onkeyup="buscarNF(this.value)"
>


<table>


<thead>

<tr>

<th>NF</th>
<th>Data</th>
<th>Valor</th>
<th>Ação</th>

</tr>

</thead>


<tbody id="tabelaNotas"></tbody>


</table>


</div>


</section>





<section id="produtos" class="page hidden">


<div class="panel">


<h2>Produtos</h2>


<table>

<thead>

<tr>

<th>Código</th>
<th>Descrição</th>
<th>NCM</th>

</tr>

</thead>


<tbody id="tabelaProdutos"></tbody>


</table>



</div>

</section>





<section id="auditoria" class="page hidden">


<div class="panel">


<h2>Auditoria SPED</h2>


<div id="erros">

Nenhuma análise realizada

</div>


</div>


</section>




</main>


</div>




<div id="modal" class="modal">


<div class="modal-box">


<h2>Detalhes</h2>

<div id="modalConteudo"></div>


<button onclick="fechar()">
Fechar
</button>


</div>


</div>



<script src="app.js"></script>

</body>

</html>
