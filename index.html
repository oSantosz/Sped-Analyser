<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPED Analyzer Pro</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<aside class="sidebar">

<h1>⚡ SPED</h1>

<p>Analyzer PRO</p>


<button data-page="dashboard">Dashboard</button>

<button data-page="empresa">Empresa</button>

<button data-page="notas">Notas</button>

<button data-page="produtos">Produtos</button>

<button data-page="auditoria">Auditoria</button>


</aside>





<main>


<header>

<div>

<h2>SPED Analyzer</h2>

<span id="status">
Nenhum arquivo carregado
</span>

</div>


<div>

<input 
type="file"
id="inputSped"
accept=".txt">


<button id="btnAnalise">
Analisar SPED
</button>

</div>


</header>







<section id="dashboard" class="page">


<div class="cards">


<div class="card">
Notas
<strong id="totalNotas">0</strong>
</div>


<div class="card">
Produtos
<strong id="totalProdutos">0</strong>
</div>


<div class="card">
Participantes
<strong id="totalPart">0</strong>
</div>


<div class="card">
Valor
<strong id="valorTotal">R$ 0</strong>
</div>


</div>



<div class="box">

<h3>Resumo Fiscal</h3>

<div id="resumo"></div>

</div>


</section>







<section id="empresa" class="page hidden">


<div class="box">

<h3>Empresa</h3>

<div id="empresaDados"></div>

</div>

</section>








<section id="notas" class="page hidden">


<div class="box">


<h3>Notas Fiscais</h3>



<table>


<thead>

<tr>

<th>Número<input id="fNum"></th>

<th>Série<input id="fSerie"></th>

<th>Data<input id="fData"></th>

<th>Valor<input id="fValor"></th>

<th>Chave<input id="fChave"></th>

<th>Ação</th>

</tr>


</thead>


<tbody id="listaNotas"></tbody>


</table>


</div>


</section>







<section id="produtos" class="page hidden">


<div class="box">


<h3>Produtos</h3>


<table>


<thead>

<tr>

<th>Código<input id="pCod"></th>

<th>Descrição<input id="pDesc"></th>

<th>NCM<input id="pNcm"></th>

</tr>

</thead>


<tbody id="listaProdutos"></tbody>


</table>


</div>


</section>







<section id="auditoria" class="page hidden">


<div class="box">

<h3>Auditoria</h3>

<div id="auditoriaResultado"></div>


</div>


</section>



</main>


</div>





<div id="modal" class="modal">


<div class="modalBox">


<h2>Nota Fiscal</h2>


<div id="modalTexto"></div>


<button id="fecharModal">
Fechar
</button>


</div>


</div>



<script src="app.js"></script>


</body>

</html>
