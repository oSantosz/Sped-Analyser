<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>SPED Analyzer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="layout">


<aside>

<h2>⚡ SPED</h2>


<nav>

<button onclick="aba('dashboard')">📊 Dashboard</button>

<button onclick="aba('empresa')">🏢 Empresa</button>

<button onclick="aba('notas')">🧾 Notas</button>

<button onclick="aba('produtos')">📦 Produtos</button>

<button onclick="aba('auditoria')">⚠ Auditoria</button>

</nav>


</aside>



<main>


<header>

<h1>SPED Analyzer</h1>


<div>

<input 
type="file"
id="arquivo"
accept=".txt">


<button onclick="consultar()">

🚀 Analisar SPED

</button>


</div>


</header>




<section id="dashboard" class="page">


<div class="cards">


<div class="card">

<h3>Notas</h3>

<strong id="qtdNotas">0</strong>

</div>



<div class="card">

<h3>Produtos</h3>

<strong id="qtdProdutos">0</strong>

</div>




<div class="card">

<h3>Participantes</h3>

<strong id="qtdPart">0</strong>

</div>



<div class="card">

<h3>Total</h3>

<strong id="valorTotal">

R$ 0

</strong>

</div>



</div>





<div class="panel">


<h2>Resumo Fiscal</h2>


<div id="resumo">

Nenhum SPED carregado

</div>


</div>


</section>






<section id="empresa" class="page hidden">


<div class="panel">

<h2>Empresa</h2>


<div id="dadosEmpresa"></div>


</div>


</section>








<section id="notas" class="page hidden">


<div class="panel">


<h2>Notas Fiscais</h2>



<table>


<thead>


<tr>


<th>
Número

<br>

<input 
class="filtro"
id="filtroNumero"
placeholder="Filtrar"
onkeyup="filtrarNotas()">

</th>




<th>

Série

<br>

<input 
class="filtro"
id="filtroSerie"
placeholder="Filtrar"
onkeyup="filtrarNotas()">

</th>




<th>

Modelo

<br>

<input 
class="filtro"
id="filtroModelo"
placeholder="Filtrar"
onkeyup="filtrarNotas()">

</th>





<th>

Data

<br>

<input 
class="filtro"
id="filtroData"
placeholder="Filtrar"
onkeyup="filtrarNotas()">

</th>





<th>

Valor

<br>

<input 
class="filtro"
id="filtroValor"
placeholder="Filtrar"
onkeyup="filtrarNotas()">

</th>





<th>

Chave

<br>

<input 
class="filtro"
id="filtroChave"
placeholder="Filtrar"
onkeyup="filtrarNotas()">

</th>



<th>

Ação

</th>


</tr>


</thead>



<tbody id="tabelaNotas"></tbody>



</table>



</div>


</section>










<section id="produtos" class="page hidden">


<div class="panel">


<h2>Produtos</h2>




<table>


<thead>


<tr>


<th>

Código

<br>

<input 
class="filtro"
id="filtroCodigo"
placeholder="Filtrar"
onkeyup="filtrarProdutos()">

</th>




<th>

Descrição

<br>

<input 
class="filtro"
id="filtroDescricao"
placeholder="Filtrar"
onkeyup="filtrarProdutos()">

</th>





<th>

Unidade

<br>

<input 
class="filtro"
id="filtroUnidade"
placeholder="Filtrar"
onkeyup="filtrarProdutos()">

</th>





<th>

NCM

<br>

<input 
class="filtro"
id="filtroNcm"
placeholder="Filtrar"
onkeyup="filtrarProdutos()">

</th>



</tr>


</thead>


<tbody id="tabelaProdutos"></tbody>


</table>


</div>


</section>









<section id="auditoria" class="page hidden">


<div class="panel">


<h2>Auditoria</h2>


<div id="erros">

Nenhuma análise realizada

</div>


</div>


</section>





</main>


</div>





<div id="modal" class="modal">


<div class="modal-box">


<h2>Detalhes NF</h2>


<div id="modalConteudo"></div>


<br>


<button onclick="fechar()">

Fechar

</button>


</div>


</div>





<script src="app.js"></script>


</body>


</html>
