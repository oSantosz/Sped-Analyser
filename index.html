<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>SPED Analyzer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="layout">


<aside>

<h2>Analisa SPED</h2>


<nav>

<button onclick="aba('dashboard')">Dashboard</button>

<button onclick="aba('empresa')">Empresa</button>

<button onclick="aba('notas')">Notas</button>

<button onclick="aba('produtos')">Produtos</button>

<button onclick="aba('auditoria')">Auditoria</button>

</nav>


</aside>




<main>


<header>


<h1>SPED Analyzer</h1>


<div>

<input 
type="file"
id="arquivo"
accept=".txt">


<button onclick="consultar()">
Consultar
</button>

</div>


</header>




<section id="dashboard" class="page">


<div class="cards">


<div class="card">
<h3>Notas</h3>
<strong id="qtdNotas">0</strong>
</div>


<div class="card">
<h3>Produtos</h3>
<strong id="qtdProdutos">0</strong>
</div>


<div class="card">
<h3>Participantes</h3>
<strong id="qtdPart">0</strong>
</div>


<div class="card">
<h3>Total</h3>
<strong id="valorTotal">R$ 0</strong>
</div>


</div>



<div class="panel">

<h2>Resumo Fiscal</h2>

<div id="resumo">
Nenhum SPED carregado
</div>

</div>


</section>





<section id="empresa" class="page hidden">


<div class="panel">

<h2>Empresa</h2>

<div id="dadosEmpresa"></div>

</div>


</section>





<section id="notas" class="page hidden">


<div class="panel">


<h2>Notas Fiscais</h2>


<input 
placeholder="Pesquisar NF"
onkeyup="buscarNF(this.value)"
>


<table>

<thead>

<tr>

<th>Número</th>
<th>Data</th>
<th>Valor</th>
<th></th>

</tr>

</thead>


<tbody id="tabelaNotas"></tbody>


</table>


</div>


</section>






<section id="produtos" class="page hidden">


<div class="panel">


<h2>Produtos</h2>


<table>

<thead>

<tr>

<th>Código</th>
<th>Descrição</th>
<th>Unidade</th>
<th>NCM</th>

</tr>

</thead>


<tbody id="tabelaProdutos"></tbody>


</table>


</div>


</section>






<section id="auditoria" class="page hidden">


<div class="panel">


<h2>Auditoria</h2>

<div id="erros">
Nenhuma análise
</div>


</div>


</section>




</main>


</div>




<div id="modal" class="modal">


<div class="modal-box">


<h2>Detalhes NF</h2>


<div id="modalConteudo"></div>


<br>

<button onclick="fechar()">
Fechar
</button>


</div>


</div>



<script src="app.js"></script>


</body>

</html>
